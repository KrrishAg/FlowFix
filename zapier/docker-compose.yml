version: '3.8'

services:
  #--- Your Postgres Database ---
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432" 

  #--- Confluent Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0 # Using specific version
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  #--- Confluent Kafka ---
  kafka:
    image: confluentinc/cp-kafka:7.3.0 # Using specific version
    hostname: kafka
    ports:
      - "9092:9092" 
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      # Listeners: INTERNAL for inter-broker, EXTERNAL for clients outside docker network (your host)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://:9093,EXTERNAL://:9092
      # Advertised Listeners: How clients connect. Use 'kafka' hostname internally, 'localhost' externally.
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      
      # --- Automatically create your topic ---
      # Format: TOPIC_NAME:PARTITIONS:REPLICAS
      KAFKA_CREATE_TOPICS: 'zappy:1:1' 
      
    depends_on:
      - zookeeper
